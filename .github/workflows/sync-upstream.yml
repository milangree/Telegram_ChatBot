name: Sync Upstream

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Upstream repository (owner/repo)"
        required: false
        default: "milangree/Telegram_ChatBot"
      upstream_branch:
        description: "Upstream branch"
        required: false
        default: "main"
      target_branch:
        description: "Target branch in current repository"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward sync from upstream
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo }}
          INPUT_UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch }}
          INPUT_TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
          REPO_VARS_JSON: ${{ toJson(vars) }}
        run: |
          set -euo pipefail

          VAR_UPSTREAM_REPO="$(python3 - <<'PY'
          import json, os
          data = json.loads(os.environ.get('REPO_VARS_JSON') or '{}')
          print(data.get('UPSTREAM_REPO', ''))
          PY
          )"
          VAR_UPSTREAM_BRANCH="$(python3 - <<'PY'
          import json, os
          data = json.loads(os.environ.get('REPO_VARS_JSON') or '{}')
          print(data.get('UPSTREAM_BRANCH', ''))
          PY
          )"
          VAR_TARGET_BRANCH="$(python3 - <<'PY'
          import json, os
          data = json.loads(os.environ.get('REPO_VARS_JSON') or '{}')
          print(data.get('TARGET_BRANCH', ''))
          PY
          )"

          UPSTREAM_REPO="${INPUT_UPSTREAM_REPO:-${VAR_UPSTREAM_REPO:-milangree/Telegram_ChatBot}}"
          UPSTREAM_BRANCH="${INPUT_UPSTREAM_BRANCH:-${VAR_UPSTREAM_BRANCH:-main}}"
          TARGET_BRANCH="${INPUT_TARGET_BRANCH:-${VAR_TARGET_BRANCH:-main}}"

          echo "Upstream repo: ${UPSTREAM_REPO}"
          echo "Upstream branch: ${UPSTREAM_BRANCH}"
          echo "Target branch: ${TARGET_BRANCH}"
          echo "Current repository: ${GITHUB_REPOSITORY:-unknown}"

          if [ "${GITHUB_REPOSITORY:-}" = "${UPSTREAM_REPO}" ]; then
            echo "::warning title=Sync skipped::Current repository is the upstream repository itself (${UPSTREAM_REPO}), skipping sync."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi

          git fetch origin "${TARGET_BRANCH}"
          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

          git fetch upstream "${UPSTREAM_BRANCH}"

          if ! git merge-base --is-ancestor HEAD "upstream/${UPSTREAM_BRANCH}"; then
            echo "::warning title=Sync skipped::Non fast-forward situation detected between origin/${TARGET_BRANCH} and upstream/${UPSTREAM_BRANCH}. Automatic sync was skipped."
            exit 0
          fi

          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "upstream/${UPSTREAM_BRANCH}")" ]; then
            echo "Already up to date."
            exit 0
          fi

          git merge --ff-only "upstream/${UPSTREAM_BRANCH}"
          git push origin "${TARGET_BRANCH}"
