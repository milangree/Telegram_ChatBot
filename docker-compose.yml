  #     POSTGRES_DB: telegram_bot
  #     POSTGRES_USER: telegram
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_password}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  telegram-chatbot-data:
